<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Melbourne AI - Automated Video Content Creator">
    <title>{% block title %}Melbourne AI Video Creator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>🎬 Melbourne AI</h1>
                <p>AI Video Creator</p>
            </div>
            <div class="navbar-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/#projects" class="nav-link">Projects</a>
                <a href="/#about" class="nav-link">About</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Melbourne AI. All rights reserved. | Powered by Open-Source AI</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
